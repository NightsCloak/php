on:
  push:
    branches:
      - master

env:
  REGISTRY_NAME: registry.ajnoz.com
  APP_NAME: php
  ENVIRONMENT: base

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: Gitlab Registry Login
      uses: docker/login-actions@v2
      with:
          registry: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      # Container build and push to a Azure Container Registry (ACR)
    - name: Build Image
      run: |
        docker build . -t ${{ env.REGISTRY_NAME }}/${{ env.APP_NAME }}:latest --progress plain
        docker push ${{ env.REGISTRY_NAME }}/${{ env.APP_NAME }}:latest
