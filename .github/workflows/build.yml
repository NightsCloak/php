on:
  push:
    branches:
      - master

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

env:
  AWS_REGION: "us-east-1"
  REGISTRY_URI: 990860969901.dkr.ecr.us-east-1.amazonaws.com
  PROJECT: nightscloak
  APP_NAME: php
  ENVIRONMENT: base

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [
          {platform: linux/amd64, cache: cache-amd64},
          {platform: linux/arm64, cache: cache-arm64}
        ]
    steps:
      # Echo Platform
      - name: Prepare
        run: |
          platform=${{ matrix.build.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - uses: actions/checkout@main

      # Assume AWS Role and set kubectl
      - name: Configure Aws Creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::990860969901:role/Github
          role-session-name: GitHub_AWS_ODIC
          aws-region: ${{ env.AWS_REGION }}
      - name: STS GetCallerIdentity
        run: |
          aws sts get-caller-identity

      # Connect to Container Registry
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=true
          tags: |
            type=sha
          images: ${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }}

      - name: Setup Qemu for multiplatform
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Container build and push to a Container Registry (ACR)
      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.build.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }}:${{ matrix.build.cache }}
          cache-to: type=registry,image-manifest=true,oci-mediaTypes=true,ref=${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }}:${{ matrix.build.cache }},mode=max
          file: ./Dockerfile

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=true
          tags: |
            type=sha
          images: ${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }}

      # Assume AWS Role and set kubectl
      - name: Configure Aws Creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::990860969901:role/Github
          role-session-name: GitHub_AWS_ODIC
          aws-region: ${{ env.AWS_REGION }}
      - name: STS GetCallerIdentity
        run: |
          aws sts get-caller-identity

      # Connect to Container Registry
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_URI }}/${{ env.PROJECT }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.version }} 
