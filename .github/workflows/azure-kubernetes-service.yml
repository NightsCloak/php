on:
  push:
    branches:
      - master

env:
  REGISTRY_NAME: intract
  APP_NAME: php
  ENVIRONMENT: base

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

      # Connect to Azure Container Registry (ACR)
    - name: Connect to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY_NAME }}.azurecr.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

      # Container build and push to a Azure Container Registry (ACR)
    - name: Build Image
      run: |
        docker build . -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.APP_NAME }}/staging:${{ github.sha }} -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.APP_NAME }}/${{ env.ENVIRONMENT }}:latest --progress plain
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.APP_NAME }}/${{ env.ENVIRONMENT }}:latest